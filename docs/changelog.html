<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — Afficheur F1ATB</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--orange:#f57d05;--cyan:#00ffff;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--radius:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:700px;margin:0 auto;}

    .header{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--orange);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;text-align:center;}
    .header h1{font-family:'Rajdhani',sans-serif;color:var(--cyan);font-size:1.8rem;letter-spacing:2px;}
    .header p{color:var(--muted);font-size:0.85rem;margin-top:4px;}

    /* Styles appliqués au markdown rendu */
    #changelog h1,#changelog h2{font-family:'Rajdhani',sans-serif;color:var(--orange);font-size:1.2rem;letter-spacing:1px;padding:12px 16px;margin-top:12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:var(--radius);}
    #changelog h3{font-family:'Rajdhani',sans-serif;color:var(--cyan);font-size:1rem;margin:12px 0 6px 0;letter-spacing:1px;}
    #changelog ul{list-style:none;padding:0;margin:0 0 12px 0;}
    #changelog ul li{color:var(--muted);padding:5px 10px;font-size:0.88rem;border-bottom:1px solid var(--border);}
    #changelog ul li::before{content:"▸ ";color:var(--cyan);}
    #changelog ul li:last-child{border-bottom:none;}
    #changelog p{color:var(--muted);font-size:0.88rem;margin:8px 0;}
    #changelog strong{color:var(--text);}
    #changelog a{color:var(--cyan);text-decoration:none;}
    #changelog a:hover{text-decoration:underline;}
    #changelog hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
    #changelog code{background:var(--surface2);color:var(--cyan);padding:2px 6px;border-radius:4px;font-size:0.82rem;}

    .loading{color:var(--muted);text-align:center;padding:40px;font-size:0.9rem;}
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ AFFICHEUR F1ATB</h1>
    <p>Historique des versions</p>
  </div>

  <div id="changelog"><p class="loading">Chargement du changelog...</p></div>

  <script>
    fetch("https://raw.githubusercontent.com/loustic03/Afficheur-routeur/main/docs/changelog.md")
      .then(res => res.text())
      .then(text => {
        document.getElementById("changelog").innerHTML = marked.parse(text);
      })
      .catch(() => {
        document.getElementById("changelog").innerHTML = "<p style='color:var(--orange);text-align:center;'>Impossible de charger le changelog.</p>";
      });
  </script>

</body>
</html>
