
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tactile Afficheur routeur - Flash ESP32</title>
<script type="module"
  src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module">
</script>
<style>
  body {
    font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI",
                 Roboto, Ubuntu, sans-serif;
    padding: 20px;
    background-color: #f8f8f8;
    color: #333;
  }
  h1, h2 {
    text-align: center;
  }
  .flash-container {
    max-width: 520px;
    margin: 30px auto;
    padding: 24px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 0 12px rgba(0,0,0,0.1);
    text-align: center;
  }
  .info {
    font-size: 0.95rem;
    margin: 14px 0 20px;
    color: #555;
  }
  /* Menu déroulant */
  .select-wrapper {
    margin: 0 0 18px 0;
  }
  .select-wrapper label {
    display: block;
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #444;
  }
  .select-wrapper select {
    width: 100%;
    padding: 10px 14px;
    font-size: 1rem;
    border-radius: 10px;
    border: 1.5px solid #ccc;
    background: #f4f8ff;
    color: #333;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .select-wrapper select:focus {
    border-color: #03a9f4;
  }
  .btn-wrapper {
    display: flex;
    justify-content: center;
    width: 100%;
    margin: 12px 0;
  }
  .btn {
    width: 100%;
    max-width: 100%;
    padding: 12px 20px;
    font-size: 1rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    text-align: center;
  }
  .btn-primary {
    background-color: #03a9f4;
  }
  .btn-primary:hover {
    background-color: #0288d1;
  }
  .btn-secondary {
    background-color: #4caf50;
  }
  .btn-secondary:hover {
    background-color: #388e3c;
  }
</style>
</head>
<body>
<div class="flash-container">
  <h1>Tactile Afficheur routeur pour F1ATB</h1>
  <h2>Installation ESP32</h2>
  <p class="info">
    Branchez votre ESP32, choisissez la version puis cliquez sur <strong>Installer le firmware</strong>.<br>
    Un guide PDF est disponible si besoin.
  </p>

  <!-- Menu déroulant choix de version - à commenter quand la version V4.01 sera arriver -->
  <div class="select-wrapper">
    <label for="version-select">Choisir la version du firmware :</label>
    <select id="version-select" onchange="updateManifest()">
      <option value="./manifest.json">Version 3.00 (core original)</option>
      <option value="./manifest_v304.json">Version 3.04 (core modifié)</option>
    </select>
  </div>

  <!-- Bouton ESP Web Tools — manifest mis à jour dynamiquement -->
  <div class="btn-wrapper">
    <esp-web-install-button
      id="install-btn"
      manifest="./manifest.json"
      erase-flash>
      <button class="btn btn-primary">
        Installer le firmware
      </button>
    </esp-web-install-button>
  </div>

  <div class="btn-wrapper">
    <a class="btn btn-secondary"
       href="Tuto-mise-en-place-tactile-Afficheur-pour-F1atb.pdf"
       target="_blank">
      Télécharger le guide PDF
    </a>
  </div>
</div>

<script>
  function updateManifest() {
    const select = document.getElementById('version-select');
    const btn = document.getElementById('install-btn');
    // Met à jour l'attribut manifest selon la version choisie à modifier pour V4.01
    btn.setAttribute('manifest', select.value);
  }
</script>
</body>
</html>
